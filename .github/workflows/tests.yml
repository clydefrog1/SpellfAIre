name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend (JUnit + Integration)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Run backend unit + integration tests
        working-directory: backend
        run: ./mvnw verify -DskipTests=false

  frontend:
    name: Frontend (Karma)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Run Karma tests
        working-directory: frontend
        run: npm run test -- --watch=false --browsers=ChromeHeadless

  e2e-mock:
    name: E2E (Playwright mocked)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run mocked e2e tests
        working-directory: frontend
        run: npm run e2e:mock

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-mock-report
          path: |
            frontend/playwright-report
            frontend/test-results

  e2e-real:
    name: E2E (Playwright real backend)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: spellfaire
          MYSQL_DATABASE: spellfaire
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: backend
        env:
          PORT: 8080
          MYSQL_URL: jdbc:mysql://127.0.0.1:3306/spellfaire?useSSL=false&allowPublicKeyRetrieval=true
          MYSQL_USER: root
          MYSQL_PASSWORD: spellfaire
          CORS_ALLOWED_ORIGINS: http://localhost:4200
          JWT_SECRET: ci-e2e-secret
          REFRESH_COOKIE_SECURE: false
        run: |
          ./mvnw -DskipTests spring-boot:run > ../backend-e2e.log 2>&1 &

      - name: Wait for backend
        run: |
          for i in {1..90}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/auth/me || true)
            if [ "$STATUS" != "000" ]; then
              echo "Backend is reachable with HTTP $STATUS"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to start" >&2
          tail -n 200 backend-e2e.log || true
          exit 1

      - name: Run real-backend e2e tests
        working-directory: frontend
        run: npm run e2e:real

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-real-report
          path: |
            frontend/playwright-report
            frontend/test-results
            backend-e2e.log
