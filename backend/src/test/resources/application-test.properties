spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spellfaire.db.reset-on-startup=false
spellfaire.data.init.enabled=false
spellfaire.data.init.drop-existing=false
spellfaire.security.cors.allowed-origins=http://localhost:4200,http://localhost:4201
spellfaire.security.jwt.secret=test-secret
spellfaire.security.jwt.issuer=spellfaire-test
spellfaire.security.jwt.access-token-ttl-seconds=900
spellfaire.security.refresh.cookie-name=spellfaire_refresh
spellfaire.security.refresh.ttl-seconds=3600
spellfaire.security.refresh.cookie-secure=false
